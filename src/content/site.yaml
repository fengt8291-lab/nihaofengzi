  profile:
    about:
      introduction:
        - '我在北京出生和成长，目前就读于首都经济贸易大学工商管理学院。我的大学经历并不是一条完全固定的路线：专业、班级、宿舍和个人方向都经历过变化。我也在这些变化中重新判断自己适合什么、真正想做什么。'
        - '与其把大学生活理解为沿着一条预设路线前进，我更愿意把它看作一个持续认识自己、修正方向并建立能力结构的过程。'
      focus:
        - '我学习工商管理和数智管理，但不希望管理知识只停留在概念、考试和报告中。我更希望看到它如何进入真实的组织、产品和个人工作流程。'
        - '我长期使用 ChatGPT、Codex、OpenClaw 等 AI 工具。使用得越多，我越意识到，真正困难的不是让 AI 生成内容，而是定义问题、组织上下文、判断结果、承担责任和持续迭代。'
        - '我持续关注的也不只是 AI，而是人在变化的技术和环境中，如何保持判断、行动能力和对现实生活的连接。'
      turningPoints:
        - title: '大学阶段多次调整方向'
          period: '大一至大二上学期'
          description: '专业、班级、宿舍和发展方向都经历过变化。我也反复比较过保研、考研、出国、就业和独立创造等路径。这个过程让我更重视可验证的能力、可持续的生活节奏和自主选择，也逐渐不再希望只依赖一个身份标签获得安全感。'
        - title: '开始独立推进数字产品和网站'
          period: '2026 年 1 月至今'
          description: '我开始更系统地使用 AI 工具，从想法出发推进 DailyTasks、今夜补救、OrgGamify 和你好丰子等网页或产品原型。在这个过程中，我逐渐意识到，“会不会手写所有代码”并不是唯一关键能力；问题定义、内容结构、验收标准、调试、取舍和复盘同样重要。做出网页原型也不等于完成产品，真实用户反馈和持续运营仍然是下一步。'
        - title: '进入真实组织、工作和研究流程'
          description: '学生会、班级事务、青马班、无印良品兼职和 ESG 报告项目，让我看到很多能力无法被个人项目代替：按流程协作、面对他人需求、处理重复细节、保证准确，以及在具体角色中承担责任。'
      current:
        - '我现在最重要的身份仍然是一名本科生。我正在建立更清晰的能力结构和职业方向，也在整理个人经历、项目、研究成果和作品。'
        - '“你好丰子”会成为一个长期维护的个人数字空间。它既服务于阶段性的求职和展示，也会继续记录我的观点、生活和变化，而不被某一种职业身份永久限制。'
    experiences:
      - id: 'student-union'
        category: 'campus'
        title: '首都经济贸易大学校学生会'
        role: '办公室部长'
        period: '2025.09—2026.06'
        summary: '参与校级活动、学生公共事务、对外交流以及公众号内容工作。'
        responsibilities:
          - '参与校级大型活动的前期筹备、现场执行和宣传记录。'
          - '参与学生代表大会、研究生代表大会、相关会议和校园歌手大赛等活动支持。'
          - '参与北京多所高校交流、参访和研讨活动。'
          - '参与学生会公众号内容排版与文稿工作。'
        featured: true
        resume: true
