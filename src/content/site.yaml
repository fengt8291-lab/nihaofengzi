          - '班级公共事务'
          - '无印良品兼职'
      - title: 'AI 协作与数字原型'
        description: '使用 ChatGPT、Codex、OpenClaw、GitHub 及前端工具组织上下文、推进网页原型，并进行验收和复盘。'
        evidence:
