      - id: 'esg-report'
        category: 'research'
        title: '中国 ESG 研究院报告项目'
        organization: '首都经济贸易大学中国 ESG 研究院'
        role: '数据整理与文字校对'
        period: '2024'
        summary: '参与《中国上市公司 ESG 评价报告（2024）》项目，依据企业年报、ESG 报告或可持续发展报告等公开材料，完成信息检索、摘录、整理、规范录入与指定章节文字校对。'
        responsibilities:
          - '根据企业年报、ESG 报告或可持续发展报告等公开材料检索披露内容。'
          - '摘录、整理企业数据并录入指定统计网站。'
          - '对报告第 10.2.2—19.4.3 节进行文字校对。'
          - '使用 Excel、PDF 阅读检索工具和在线录入平台完成资料整理。'
        featured: true
        resume: true
        boundary: '本人没有独立撰写报告章节，也不将完整报告成果归为个人成果。'
    capabilities:
      - title: '产品问题定义与用户洞察'
        description: '从具体生活场景中定义问题、确定最小闭环，并判断哪些功能不应该加入。'
        evidence:
